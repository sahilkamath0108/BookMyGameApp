components:
  schemas:
    TournamentMatchUp:
      type: object
      properties:
        matchup_id:
          type: string
          format: uuid
        player1:
          type: string
          format: uuid
          description: ID of first team/player
        player2:
          type: string
          format: uuid
          description: ID of second team/player
        winner:
          type: string
          format: uuid
          description: ID of winning team/player
        round_tag:
          type: integer
          description: Round number, starting from 1 for initial rounds
        tournament_id:
          type: string
          format: uuid
        team1_score:
          type: integer
          nullable: true
          description: Score achieved by team 1
        team2_score:
          type: integer
          nullable: true
          description: Score achieved by team 2
        result_details:
          type: object
          nullable: true
          description: Additional details about match result
        scheduled_time:
          type: string
          format: date-time
          description: When the match is scheduled to take place
        completed_at:
          type: string
          format: date-time
          nullable: true
          description: When the match was completed
    
    WinnerUpdate:
      type: object
      required:
        - winner_id
      properties:
        winner_id:
          type: string
          format: uuid
          description: ID of the winning team
    
    MatchupResultUpdate:
      type: object
      required:
        - winner_id
      properties:
        winner_id:
          type: string
          format: uuid
          description: ID of the winning team
        team1_score:
          type: integer
          description: Score achieved by team 1
        team2_score:
          type: integer
          description: Score achieved by team 2
        result_details:
          type: object
          description: Additional details about match result

paths:
  /api/matchups/tournament/{tournamentId}/generate:
    post:
      tags: [Matchups]
      summary: Generate initial matchups for a tournament
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: tournamentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        201:
          description: Initial matchups generated successfully
        400:
          description: Tournament is not in appropriate status, not enough teams, or odd number of teams
        401:
          description: Not authorized
        403:
          description: Only super admins can generate matchups
        404:
          description: Tournament not found
        409:
          description: Matchups already exist for this tournament
  
  /api/matchups/tournament/{tournamentId}/next-round:
    post:
      tags: [Matchups]
      summary: Generate next round matchups based on previous round winners
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: tournamentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        201:
          description: Next round matchups generated successfully
        400:
          description: Tournament is not in progress, previous round not complete, or not enough winners
        401:
          description: Not authorized
        403:
          description: Only super admins can generate next round matchups
        404:
          description: Tournament or previous matchups not found
        409:
          description: Next round matchups already exist
  
  /api/matchups/tournament/{tournamentId}:
    get:
      tags: [Matchups]
      summary: Get all matchups for a tournament
      parameters:
        - in: path
          name: tournamentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Matchups retrieved successfully
        404:
          description: Tournament not found
    delete:
      tags: [Matchups]
      summary: Delete all matchups for a tournament
      description: Removes all matchups associated with the specified tournament
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: tournamentId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: All tournament matchups deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: All matchups for the tournament deleted successfully
                  data:
                    type: object
                    properties:
                      count:
                        type: integer
                        description: Number of matchups deleted
        400:
          description: Cannot delete matchups from completed or ended tournaments
        401:
          description: Not authorized
        403:
          description: Only super admins can delete tournament matchups
        404:
          description: Tournament not found
        500:
          description: Server error
  
  /api/matchups/{matchup_id}:
    get:
      tags: [Matchups]
      summary: Get a specific matchup by ID
      parameters:
        - in: path
          name: matchup_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Matchup retrieved successfully
        404:
          description: Matchup not found
    delete:
      tags: [Matchups]
      summary: Delete a matchup
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchup_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: Matchup deleted successfully
        400:
          description: Cannot delete completed matchups or matchups from ended tournaments
        401:
          description: Not authorized
        403:
          description: Only super admins can delete matchups
        404:
          description: Matchup not found
  
  /api/matchups/{matchup_id}/winner:
    patch:
      tags: [Matchups]
      summary: Update a matchup with a winner
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchup_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WinnerUpdate'
      responses:
        200:
          description: Matchup winner updated successfully
        400:
          description: Winner is not a participant in the matchup
        401:
          description: Not authorized
        403:
          description: Only super admins can update matchup winners
        404:
          description: Matchup not found
        409:
          description: Matchup already has a winner
  
  /api/matchups/{matchup_id}/result:
    patch:
      tags: [Matchups]
      summary: Update matchup with detailed results including scores
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: matchup_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MatchupResultUpdate'
      responses:
        200:
          description: Matchup result updated successfully
        400:
          description: Winner is not a participant in the matchup
        401:
          description: Not authorized
        403:
          description: Only super admins can update matchup results
        404:
          description: Matchup not found
        409:
          description: Matchup already has a winner
        500:
          description: Server error 