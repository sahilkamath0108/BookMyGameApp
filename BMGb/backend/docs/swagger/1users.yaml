components:
  schemas:
    User:
      type: object
      required:
        - Name
        - email
        - password
      properties:
        user_id:
          type: string
          format: uuid
        Name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        GamerTag:
          type: object
        profile_pic:
          type: string
        cover_photo:
          type: string
        overall_gamer_rating:
          type: object

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    VerifyOTPRequest:
      type: object
      required:
        - email
        - otp
      properties:
        email:
          type: string
          format: email
        otp:
          type: string
          minLength: 6
          maxLength: 6

    UpdateProfileRequest:
      type: object
      properties:
        Name:
          type: string
        password:
          type: string
          format: password
        profile_pic:
          type: string
        cover_photo:
          type: string
        GamerTag:
          type: object

    GoogleCallbackRequest:
      type: object
      required:
        - idToken
      properties:
        idToken:
          type: string
          description: Google ID token from the client

paths:
  /api/users/register:
    post:
      tags: [Users]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        201:
          description: User created successfully
        400:
          description: Invalid input
        409:
          description: Email already exists

  /api/users/login:
    post:
      tags: [Users]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /api/users/forgot-password:
    post:
      tags: [Users]
      summary: Request password reset OTP
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        200:
          description: OTP sent successfully
        404:
          description: User not found
        500:
          description: Server error

  /api/users/verify-otp:
    post:
      tags: [Users]
      summary: Verify OTP and get reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyOTPRequest'
      responses:
        200:
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      token:
                        type: string
        400:
          description: Invalid or expired OTP
        404:
          description: User not found

  /api/users/profile:
    get:
      tags: [Users]
      summary: Get user profile
      description: Retrieve the profile of the currently authenticated user
      responses:
        200:
          description: User profile retrieved successfully
        401:
          description: Not authorized

    patch:
      tags: [Users]
      summary: Update user profile
      description: Update the profile of the currently authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        200:
          description: Profile updated successfully
        400:
          description: Invalid input
        401:
          description: Not authorized

  /api/users/gamer-tag:
    patch:
      tags: [Users]
      summary: Update gamer tag
      description: Update the gamer tag of the currently authenticated user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - gamerTag
              properties:
                gamerTag:
                  type: string
      responses:
        200:
          description: Gamer tag updated successfully
        400:
          description: Invalid input
        401:
          description: Not authorized
        409:
          description: Gamer tag already in use

  /api/users/delete:
    delete:
      tags: [Users]
      summary: Delete user account
      description: Delete the account of the currently authenticated user
      responses:
        200:
          description: Account deleted successfully
        401:
          description: Not authorized
        404:
          description: User not found

  /api/users/google:
    get:
      tags: [Users]
      summary: Get Google authentication URL
      description: Returns the Google OAuth URL for frontend redirection
      responses:
        200:
          description: Successfully generated Google auth URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      url:
                        type: string
        500:
          description: Server error

  /api/users/google/callback:
    post:
      tags: [Users]
      summary: Process Google authentication
      description: Authenticates user with Google ID token and returns JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleCallbackRequest'
      responses:
        200:
          description: Successfully authenticated with Google
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                      isNewUser:
                        type: boolean
        400:
          description: Invalid or missing Google ID token
        500:
          description: Server error 